<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd56b" />
      <stop offset="50%" stop-color="#c7a447" />
      <stop offset="100%" stop-color="#9f741f" />
    </linearGradient>
    <linearGradient id="gold-secondary" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0ca" />
      <stop offset="100%" stop-color="#765310" />
    </linearGradient>
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Sleek circle background for excellent tab visibility in both light and dark browser themes -->
  <circle cx="50" cy="50" r="46" fill="#080909" stroke="url(#gold-primary)" stroke-width="4" />
  
  <!-- Stylized Monogram V -->
  <path d="M28 28 L47 70 H53 L34 28 Z" fill="url(#gold-primary)" />
  <path d="M72 28 L53 70 H47 L66 28 Z" fill="url(#gold-secondary)" />
  
  <!-- Precision tech dot -->
  <circle cx="50" cy="70" r="4.5" fill="#ffd56b" filter="url(#logo-glow)" />
</svg>
